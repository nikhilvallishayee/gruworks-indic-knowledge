// ---------------------------------------------------------------------------
// API Helper
// ---------------------------------------------------------------------------
async function api(path, options = {}) {
  const { method = 'GET', body, params } = options;
  let url = `${API_BASE}${path}`;
  if (params) {
    const qs = new URLSearchParams(params).toString();
    if (qs) url += `?${qs}`;
  }
  const headers = { 'Content-Type': 'application/json' };
  const res = await fetch(url, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  if (res.status === 204) return null;
  return res.json();
}

// ---------------------------------------------------------------------------
// Utility: Script Detection
// ---------------------------------------------------------------------------
function detectScript(text) {
  if (!text) return 'unknown';
  const devanagariRange = /[\u0900-\u097F]/;
  const iastDiacritics = /[āīūṛṝḷḹṃḥṅñṇṭḍśṣ]/i;
  if (devanagariRange.test(text)) return 'devanagari';
  if (iastDiacritics.test(text)) return 'iast';
  return 'english';
}

function Skeleton({ className = '', lines = 3 }) {
  return React.createElement('div', { className: `space-y-2 ${className}` },
    Array.from({ length: lines }, (_, i) =>
      React.createElement('div', { key: i, className: `skeleton h-4 ${i === lines - 1 ? 'w-2/3' : 'w-full'}` })
    )
  );
}

function ScoreBar({ score, label }) {
  const pct = Math.round(score * 100);
  return React.createElement('div', { className: 'flex items-center gap-2 text-xs text-g-7' },
    label && React.createElement('span', null, label),
    React.createElement('div', { className: 'flex-1 h-1.5 bg-g-e' },
      React.createElement('div', { className: 'h-full bg-g-3 transition-all', style: { width: `${pct}%` } })
    ),
    React.createElement('span', { className: 'tabular-nums w-8 text-right' }, `${pct}%`)
  );
}

function Tag({ children, onClick }) {
  return React.createElement('span', {
    className: `inline-block px-2 py-0.5 text-xs border border-g-d bg-g-f text-g-5 mr-1 mb-1 ${onClick ? 'cursor-pointer hover:bg-g-e hover:border-g-b' : ''}`,
    onClick,

          React.createElement(Btn, { variant: 'outline', onClick: runTranslit, disabled: loading.translit || !translitInput.trim() }, 'Convert'),
        ),
        React.createElement('div', { className: 'flex-1 min-w-[200px]' },
          React.createElement('label', { className: 'text-xs text-g-9 block mb-1' }, 'Output'),
          React.createElement('div', { className: 'w-full text-sm border border-g-d px-3 py-2 bg-g-f min-h-[60px] font-devanagari' },
            translitOutput ? translitOutput.output : React.createElement('span', { className: 'text-g-b' }, 'Result will appear here'),
          ),
        ),
      ),
    ),

    // Activity log
    React.createElement('div', { className: 'border border-g-d bg-white p-5' },
      React.createElement('h3', { className: 'text-sm font-bold uppercase tracking-wider text-g-3 mb-3' }, 'Activity Log'),
      logs.length === 0
        ? React.createElement('p', { className: 'text-xs text-g-9 italic' }, 'No activity recorded yet.')
        : React.createElement('div', { className: 'space-y-1 max-h-48 overflow-y-auto scrollbar-thin' },
          logs.map((l, i) =>
            React.createElement('div', { key: i, className: 'flex items-start gap-2 text-xs py-1 border-b border-g-e last:border-0' },
              React.createElement('span', { className: `w-1.5 h-1.5 mt-1 flex-shrink-0 ${l.ok ? 'bg-g-3' : 'bg-g-9'}` }),
              React.createElement('span', { className: 'text-g-b tabular-nums flex-shrink-0' }, new Date(l.ts).toLocaleTimeString()),
              React.createElement('span', { className: 'text-g-5' }, l.msg),
            )
          )
        ),
    ),
  );
}

  ];

  return React.createElement('div', { className: 'min-h-screen flex flex-col' },
    // Header
    React.createElement('header', { className: 'bg-g-0 text-white' },
      React.createElement('div', { className: 'max-w-6xl mx-auto px-4 py-4 flex items-center justify-between' },
        React.createElement('div', { className: 'flex items-center gap-3' },
          React.createElement('span', { className: 'font-devanagari text-2xl' }, 'गज'),
          React.createElement('div', null,
            React.createElement('h1', { className: 'text-lg font-medium tracking-wide' }, 'GAJASHASTRA'),
            React.createElement('p', { className: 'text-xs text-g-9 tracking-widest uppercase' }, 'Sanskrit Intelligence Platform'),
          ),
        ),
        React.createElement('div', { className: 'text-right hidden sm:block' },
          React.createElement('p', { className: 'font-devanagari text-sm text-g-7' }, 'गजशास्त्रम्'),
          React.createElement('p', { className: 'text-xs text-g-9 font-serif-latin italic' }, 'by Palakapya Muni'),
        ),
      ),
      // Tabs
      React.createElement('nav', { className: 'max-w-6xl mx-auto px-4' },
        React.createElement('div', { className: 'flex gap-0 border-t border-g-2' },
          tabs.map(t =>
            React.createElement('button', {
              key: t.id, onClick: () => setActiveTab(t.id),
              className: `px-4 py-2.5 text-sm tracking-wider transition-colors relative ${
                activeTab === t.id
                  ? 'text-white bg-g-2'
                  : 'text-g-7 hover:text-g-d hover:bg-g-1'
              }`,
            },
              React.createElement('span', { className: 'uppercase' }, t.label),
              React.createElement('span', { className: 'font-devanagari text-xs ml-1.5 opacity-50 hidden md:inline' }, t.labelSanskrit),
              activeTab === t.id && React.createElement('div', { className: 'absolute bottom-0 left-0 right-0 h-0.5 bg-white' }),
            )
          )
        ),
      ),
    ),

    // Content
    React.createElement('main', { className: 'flex-1 px-4 py-6' },
      activeTab === 'search' && React.createElement(SearchTab),
      activeTab === 'reference' && React.createElement(ReferenceTab),
      activeTab === 'assistant' && React.createElement(AssistantTab),
      activeTab === 'zoo' && React.createElement(ZooTab),
      activeTab === 'admin' && React.createElement(AdminTab),
    ),

    // Footer
    React.createElement('footer', { className: 'border-t border-g-e py-4 mt-auto' },
      React.createElement('div', { className: 'max-w-6xl mx-auto px-4 flex items-center justify-between text-xs text-g-9' },
        React.createElement('span', null, 'Gajashastra Sanskrit Intelligence Platform'),
        React.createElement('span', { className: 'font-devanagari' }, 'गजानां हितम् इच्छता'),
        React.createElement('span', null, `API: ${API_BASE}`),
      ),
    ),
  );
}

// ---------------------------------------------------------------------------
// Mount

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
